services:
  mongodb:
    image: mongo:8.2
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    ports:
      - 27017:27017
    volumes:
      - ./mongo_data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin1234
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin1234@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  redis:
    image: redis:8-alpine
    ports:
      - 6379:6379
    volumes:
      - ./redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build: .
    container_name: anti-social-api
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      PORT: 3000
      COMMENT_MAX_AGE_MONTHS: 6
      MONGO_URI: mongodb://admin:admin1234@mongodb:27017/tienda?authSource=admin
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
